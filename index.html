<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="pannellum.css"/>
  <script src="pannellum.js"></script>
  <style>html, body, #panorama { width:100%; height:100vh; margin:0; }</style>
</head>
<body>
  <div id="panorama"></div>
  <script>
    pannellum.viewer('panorama', {
      default: {
        firstScene: 'scene1',
        sceneFadeDuration: 1000
      },
      scenes: {
        scene1: {
          title: 'scene1',
          panorama: 'Panorama1.jpg',
          autoLoad: true,
	  hotSpotDebug: true,
          hotSpots: [
            {
              pitch: -7,
              yaw: -2,
              type: 'scene',
              sceneId: 'scene2',
              text: 'Aller scene2'
            }
          ]
        },
        scene2: {
          title: 'scene2',
          panorama: 'Panorama2.jpg',
          autoLoad: true,
	  hotSpotDebug: true,
          hotSpots: [
            {
              pitch: -10,
              yaw: -5,
              type: 'scene',
              sceneId: 'scene1',
              text: 'Retour scene1'
            }
          ]
        }
      }
    });
  </script>
</body>
</html>
